## ============================================================
## RecAutoPilot 实验配置（Agent 可修改）
## ============================================================

## 实验信息
experiment_name: baseline_v1

## 训练日期范围（3天训练 + 1天验证）
train_start_date: 2025-09-02
train_end_date: 2025-09-04
validation_date: 2025-09-05

## ============================================================
## 模型架构配置
## ============================================================

## 模型类型
## 可选: WideDeep, DeepFM, DCN, MaskNet, FFM, APG, FwFM, PPNet
model_type: WideDeep

## 是否使用 Wide 部分（仅对 WideDeep 系列有效）
use_wide: False

## Embedding 维度
## 建议范围: 4, 8, 12, 16, 24, 32
embedding_size: 8

## DNN 隐藏层配置
## 示例: [256,128], [512,256,64], [1024,512,256,64]
dnn_hidden_units: [512, 256, 64]

## Dropout 比率
## 建议范围: 0.0, 0.1, 0.3, 0.5
net_dropout: 0.5

## 是否使用 BatchNorm
batch_norm: False

## ============================================================
## 优化器配置
## ============================================================

## Adam 学习率
## 建议范围: 1e-5 ~ 1e-3
adam_learning_rate: 0.00001

## FTRL 参数（Wide 部分）
ftrl_alpha: 0.005
ftrl_beta: 0.05
ftrl_l1: 1.0
ftrl_l2: 10.0

## ============================================================
## 训练配置
## ============================================================

## 批大小
## 建议范围: 128, 256, 512, 1024
batch_size: 256

## 训练轮数
training_epoches: 1

## 是否打乱训练数据
shuffle_training_dataset: True

## 损失函数
## 可选: log_loss, wce_loss, mse_loss, focal_loss
loss_func: log_loss

## 增量训练模型路径（null 表示从头训练）
model_in_path: null
